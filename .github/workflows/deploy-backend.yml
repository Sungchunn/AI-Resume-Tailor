name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run Ruff linter
        run: poetry run ruff check . --output-format=github

      - name: Run unit tests
        run: |
          poetry run pytest \
            tests/services/test_audit_service.py \
            tests/services/test_document_converter.py \
            tests/services/test_file_storage.py \
            tests/services/test_html_to_document.py \
            tests/services/test_pii_stripper.py \
            tests/services/ats/test_analyzer_core.py \
            tests/services/ats/test_content_quality.py \
            tests/services/ats/test_knockout.py \
            tests/services/ats/test_role_proximity.py \
            tests/services/ats/test_structure.py \
            tests/api/test_health.py \
            -v --tb=short --no-header -q
        env:
          # Minimal env vars for tests that don't need real connections
          MONGODB_URI: "mongodb://localhost:27017/test"
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          JWT_SECRET_KEY: "test-secret-key"
          ENVIRONMENT: "test"

  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            cd /home/deploy/app
            git pull origin main
            cd backend
            poetry install --no-interaction
            poetry run alembic upgrade head
            pm2 restart fastapi
            pm2 save

            echo "=========================================="
            echo "POST-DEPLOYMENT HEALTH CHECK"
            echo "=========================================="
            echo "Waiting 5 seconds for app to start..."
            sleep 5

            HEALTH_URL="http://localhost:8000/health"
            MAX_ATTEMPTS=5
            RETRY_DELAY=3

            for i in $(seq 1 $MAX_ATTEMPTS); do
              echo ""
              echo "Attempt $i/$MAX_ATTEMPTS: Checking $HEALTH_URL"
              HTTP_STATUS=$(curl -s -o /tmp/health_response.json -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")

              if [ "$HTTP_STATUS" = "200" ]; then
                echo "✓ Health check PASSED (HTTP $HTTP_STATUS)"
                echo ""
                echo "Response:"
                cat /tmp/health_response.json | jq . 2>/dev/null || cat /tmp/health_response.json
                echo ""
                echo "=========================================="
                echo "DEPLOYMENT SUCCESSFUL"
                echo "=========================================="
                exit 0
              fi

              echo "✗ Health check returned HTTP $HTTP_STATUS"
              if [ -f /tmp/health_response.json ]; then
                echo "Response body:"
                cat /tmp/health_response.json | jq . 2>/dev/null || cat /tmp/health_response.json
              fi

              if [ $i -lt $MAX_ATTEMPTS ]; then
                echo "Retrying in ${RETRY_DELAY}s..."
                sleep $RETRY_DELAY
              fi
            done

            echo ""
            echo "=========================================="
            echo "DEPLOYMENT FAILED"
            echo "=========================================="
            echo "Health check failed after $MAX_ATTEMPTS attempts"
            echo ""
            echo "Recent application logs (last 50 lines):"
            echo "------------------------------------------"
            pm2 logs fastapi --lines 50 --nostream
            echo ""
            echo "PM2 process status:"
            echo "------------------------------------------"
            pm2 show fastapi
            exit 1
