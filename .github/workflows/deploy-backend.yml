name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          pip install poetry
          poetry config virtualenvs.create true
          poetry config virtualenvs.in-project true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: backend/.venv
          key: venv-${{ runner.os }}-${{ hashFiles('backend/poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run Ruff linter
        run: poetry run ruff check . --output-format=github

      - name: Run unit tests
        run: |
          poetry run pytest \
            tests/services/test_audit_service.py \
            tests/services/test_document_converter.py \
            tests/services/test_file_storage.py \
            tests/services/test_html_to_document.py \
            tests/services/test_pii_stripper.py \
            tests/services/ats/test_analyzer_core.py \
            tests/services/ats/test_content_quality.py \
            tests/services/ats/test_knockout.py \
            tests/services/ats/test_role_proximity.py \
            tests/services/ats/test_structure.py \
            tests/api/test_health.py \
            -v --tb=short --no-header -q
        env:
          # Minimal env vars for tests that don't need real connections
          MONGODB_URI: "mongodb://localhost:27017/test"
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/test"
          JWT_SECRET_KEY: "test-secret-key"
          ENVIRONMENT: "test"

  deploy:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            set -e
            cd /home/deploy/app
            git pull origin main
            cd backend
            poetry install --no-interaction
            poetry run alembic upgrade head
            pm2 restart fastapi
            pm2 save

            # Health check
            echo "Waiting for app to start..."
            sleep 5
            for i in 1 2 3 4 5; do
              response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health || echo "000")
              if [ "$response" = "200" ]; then
                echo "✓ Health check passed"
                curl -s http://localhost:8000/health | jq .
                exit 0
              fi
              echo "Attempt $i: HTTP $response, retrying in 3s..."
              sleep 3
            done
            echo "✗ Health check failed after 5 attempts"
            pm2 logs fastapi --lines 30 --nostream
            exit 1
